    - direct preference optimization (DPO)
    - constitutional AI training
    - value alignment verification systems
  - id: '2.3'
    name: Model Safety Engineering
    count: 38
    pct: 5
    document_count: 7
    description_appendix_a: Technical methods and safeguards that constrain model behaviors and protect
