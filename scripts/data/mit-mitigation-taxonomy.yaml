    - safety cases
    - model registration protocols
    - public commitment disclosures
  - id: '4.5'
    name: Third-Party System Access
    count: 19
    pct: 2
    document_count: 7
    description_appendix_a: Mechanisms granting controlled system access to vetted external parties to
      enable independent assessment, validation, and safety research of AI models and capabilities.
    example_mitigations:
