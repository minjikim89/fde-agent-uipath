- id: '2'
  name: Technical & Security Controls
  definition: 'Technical, physical, and engineering safeguards that secure AI systems and constrain

    model behaviors to ensure security, safety, alignment with human values, and content integrity.

    '
  subcategories:
  - id: '2.1'
    name: Model & Infrastructure Security
    count: 32
    pct: 4
    document_count: 11
    description_appendix_a: Technical and physical safeguards that secure AI models, weights, and infrastructure
      to prevent unauthorized access, theft, tampering, and espionage.
    example_mitigations:
    - Model weight tracking systems
    - multifactor authentication protocols
    - physical access controls
    - background security checks
    - compliance with information security standards
  - id: '2.2'
    name: Model Alignment
    count: 9
    pct: 1
    document_count: 5
    description_appendix_a: Technical methods to ensure AI systems understand and adhere to human values
      and intentions.
    example_mitigations:
