- id: '3'
  name: Operational Process Controls
  definition: 'Processes and management frameworks governing AI system deployment, usage, monitoring,

    incident handling, and validation, which promote safety, security, and accountability

    throughout the system lifecycle.

    '
  subcategories:
  - id: '3.1'
    name: Testing & Auditing
    count: 127
    pct: 15
    document_count: 12
    description_appendix_a: Systematic internal and external evaluations that assess AI systems, infrastructure,
      and compliance processes to identify risks, verify safety, and ensure performance meets standards.
    example_mitigations:
    - Third-party audits
    - red teaming
    - penetration testing
    - dangerous capability evaluations
    - bug bounty programs
  - id: '3.2'
    name: Data Governance
    count: 57
    pct: 7
    document_count: 7
    description_appendix_a: Policies and procedures that govern responsible data acquisition, curation,
      and usage to ensure compliance, quality, user privacy, and removal of harmful content.
    example_mitigations:
    - Harmful content filtering protocols
    - compliance checks for data collection standards
    - user data privacy controls
    - data curation processes
  - id: '3.3'
    name: Access Management
    count: 23
    pct: 3
    document_count: 7
    description_appendix_a: Operational policies and verification systems that govern who can use AI systems
      and for what purposes to prevent safety circumvention, deliberate misuse, and deployment in high-risk
      contexts.
    example_mitigations:
    - KYC verification requirements
    - API-only access controls
    - fine-tuning restrictions
    - acceptable use policies
    - high-stakes application prohibitions
  - id: '3.4'
    name: Staged Deployment
    count: 8
    pct: 1
    document_count: 5
    description_appendix_a: Implementation protocols that deploy AI systems in stages, requiring safety
      validation before expanding user access or capabilities.
    example_mitigations:
    - Limited API access programs
    - gradual user base expansion
    - capability threshold assessments
    - pre-deployment validation checkpoints
    - treating model updates as new deployments
  - id: '3.5'
    name: Post-Deployment Monitoring
    count: 50
    pct: 6
    document_count: 9
    description_appendix_a: Ongoing monitoring processes that track AI behavior, user interactions, and
