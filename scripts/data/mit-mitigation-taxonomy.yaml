    - capability evolution assessments
    - periodic impact reports
    - automated misuse detection
    - usage pattern analysis tools
  - id: '3.6'
    name: Incident Response & Recovery
    count: 30
    pct: 4
    document_count: 9
    description_appendix_a: Protocols and technical systems that respond to security incidents, safety
