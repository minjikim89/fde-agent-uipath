- id: '4'
  name: Transparency & Accountability Controls
  definition: 'Formal disclosure practices and verification mechanisms that communicate AI system

    information and enable external scrutiny to build trust, facilitate oversight, and

    ensure accountability to users, regulators, and the public.

    '
  subcategories:
  - id: '4.1'
    name: System Documentation
    count: 37
    pct: 4
    document_count: 10
    description_appendix_a: Comprehensive documentation protocols that record technical specifications,
      intended uses, capabilities, and limitations of AI systems to enable informed evaluation and governance.
    example_mitigations:
    - Model cards
    - system architecture documentation
    - compute resource disclosures
    - safety test result reports
    - system prompts
    - model specifications
  - id: '4.2'
    name: Risk Disclosure
    count: 44
    pct: 5
    document_count: 11
    description_appendix_a: Formal reporting protocols and notification systems that communicate risk
      information, mitigation plans, safety evaluations, and significant AI activities to enable external
      oversight and inform stakeholders.
    example_mitigations:
    - Publishing risk assessment summaries
    - pre-deployment notifications to government
    - reporting large training runs
    - disclosing mitigation strategies
    - notifying affected parties
  - id: '4.3'
    name: Incident Reporting
    count: 30
    pct: 4
    document_count: 11
    description_appendix_a: Formal processes and protocols that document and share AI safety incidents,
      security breaches, near-misses, and relevant threat intelligence with appropriate stakeholders to
      enable coordinated responses and systemic improvements.
    example_mitigations:
    - Cyber threat intelligence sharing networks
    - mandatory breach notification procedures
    - incident database contributions
    - cross-industry safety reporting mechanisms
    - standardized near-miss documentation protocols
  - id: '4.4'
    name: Governance Disclosure
    count: 24
    pct: 3
    document_count: 9
    description_appendix_a: Formal disclosure mechanisms that communicate governance structures, decision
