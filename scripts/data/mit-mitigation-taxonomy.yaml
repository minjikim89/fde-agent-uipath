categories:
- id: '1'
  name: Governance & Oversight Controls
  definition: 'Formal organizational structures and policy frameworks that establish human oversight

    mechanisms and decision protocols to ensure human accountability, ethical conduct, and

    risk management throughout AI development and deployment.

    '
  subcategories:
  - id: '1.1'
    name: Board Structure & Oversight
    count: 35
    pct: 4
    document_count: 8
    description_appendix_a: Governance structures and leadership roles that establish executive accountability
      for AI safety and risk management.
    example_mitigations:
    - Dedicated risk committees
    - safety teams
    - ethics boards
    - crisis simulation training
    - multi-party authorization protocols
    - deployment veto powers
  - id: '1.2'
    name: Risk Management
    count: 125
    pct: 15
    document_count: 13
    description_appendix_a: Systematic methods that identify, evaluate, and manage AI risks for comprehensive
      risk governance across organizations.
    example_mitigations:
    - Enterprise risk management frameworks
    - risk registers with capability thresholds
    - compliance programs
    - pre-deployment risk assessments
    - independent risk assessments
  - id: '1.3'
    name: Conflict of Interest Protections
    count: 8
    pct: 1
    document_count: 3
    description_appendix_a: Governance mechanisms that manage financial interests and organizational structures
      to ensure leadership can prioritize safety over profit motives in critical situations.
    example_mitigations:
    - Background checks for key personnel
    - windfall profit redistribution plans
    - stake limitation policies
    - protections against shareholder pressure
  - id: '1.4'
    name: Whistleblower Reporting & Protection
    count: 10
    pct: 1
    document_count: 7
    description_appendix_a: Policies and systems that enable confidential reporting of safety concerns
      or ethical violations to prevent retaliation and encourage disclosure of risks.
    example_mitigations:
    - Anonymous reporting channels
    - non-retaliation guarantees
    - limitations on non-disparagement agreements
    - external whistleblower handling services
  - id: '1.5'
    name: Safety Decision Frameworks
    count: 31
    pct: 4
    document_count: 11
    description_appendix_a: Protocols and commitments that constrain decision-making about model development,
      deployment, and capability scaling, and govern safety-capability resource allocation to prevent
      unsafe AI advancement.
    example_mitigations:
    - If-then safety protocols
    - capability ceilings
    - deployment pause triggers
    - safety-capability resource ratios
  - id: '1.6'
    name: Environmental Impact Management
    count: 11
    pct: 1
    document_count: 5
    description_appendix_a: Processes for measuring, reporting, and reducing the environmental footprint
      of AI systems to ensure sustainability and responsible resource use.
    example_mitigations:
    - Carbon footprint assessment
    - emission offset programs
    - energy efficiency optimization
    - resource consumption tracking
  - id: '1.7'
    name: Societal Impact Assessment
    count: 28
    pct: 3
    document_count: 7
    description_appendix_a: Processes that assess AI systems' effects on society, including impacts on
      employment, power dynamics, political processes, and cultural values.
    example_mitigations:
    - Fundamental rights impact assessments
    - expert consultations on risk domains
    - stakeholder engagement processes
    - governance gap analyses
  node_type_hints:
  - high-impact decision nodes (executive approval, regulatory action)
  - policy enforcement nodes
  - audit checkpoint nodes
