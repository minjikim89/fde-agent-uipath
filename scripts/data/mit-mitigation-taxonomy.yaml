korean_handoff_mappings:
- ontology_cell: loan_underwriting_kr.N3 → N4 (KoFIU AML → ACS Credit Scoring)
  handoff_failure: schema_contract_drift — AML output (binary flag) → ACS feature (continuous score) undergoes
    semantic shift, resetting false-negatives
  subcategory_targets:
  - '3.5'
  - '3.1'
  - '4.3'
  rationale_ko: Post-deployment monitoring + periodic audit + cross-system incident reporting to detect
    silent failures in the AML→ACS pipe. Aligned with KoFIU FIU2024-3 reporting obligation.
  confidence: high
- ontology_cell: loan_underwriting_kr.N4 → N6 (ACS Score → LLM Risk Narrator)
  handoff_failure: weighting_loss — multi-dimensional ACS features compressed to 1-2 key factors at the LLM
    summarization stage, severing the audit trail
  subcategory_targets:
  - '4.1'
  - '2.3'
  - '3.1'
  rationale_ko: System Documentation (model card + feature importance) + Model Safety Engineering (explainability
    layer) + Testing & Auditing (SHAP consistency checks) combined. Fair Lending Act aligned.
  confidence: high
- ontology_cell: loan_underwriting_kr.N6 → N7 (LLM Narrator → Auto Decision)
  handoff_failure: false_negative_cascade — LLM hallucination propagates directly into the auto-approval stage
  subcategory_targets:
  - '2.4'
  - '3.4'
  - '3.6'
  rationale_ko: Content Safety Controls (output filtering) + Staged Deployment (canary % limit) + Incident
    Response & Recovery (rollback gate) bundle. FSS '24 guideline aligned.
  confidence: high
- ontology_cell: legal_contract_review.N2 → N3 (Clause Extraction → Risk Flagging)
  handoff_failure: schema_contract_drift — semantic mismatch between extracted clause types and risk taxonomy
  subcategory_targets:
  - '3.2'
  - '3.1'
  - '4.1'
  rationale_ko: Data Governance (clause schema standardization) + Testing & Auditing (red-team contract corpus) +
    System Documentation (schema versioning) bundle. K-PIPA Art 22-2 aligned.
  confidence: medium
- ontology_cell: loan_underwriting_kr.N7 → External (auto-approval → external notification / FSS reporting)
  handoff_failure: external_communication_risk — ambiguous disclosure format and timing for auto-approval outcomes
  subcategory_targets:
  - '4.2'
  - '4.6'
  - '4.3'
  rationale_ko: Risk Disclosure (advance notification) + User Rights & Recourse (appeal channel) + Incident
    Reporting (FSS / KoFIU reporting). Clarifies accountability boundaries when discrimination cases arise.
  confidence: high
