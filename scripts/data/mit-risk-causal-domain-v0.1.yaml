node_type_x_domain_heuristics:
- node_type: classification
  primary_domains:
  - 1.0 Discrimination & Toxicity
  - 7.0 AI safety/failures
  primary_subdomains:
  - '1.1'
  - '1.3'
  - '7.3'
  rationale: Classification models — performance gap across groups + unfair discrimination most frequently reported. ACS (credit scoring) bias cascade is the canonical case.
  korean_anchor: loan_underwriting_kr.N4 ACS — Fair Lending Act anti-discrimination compliance + SHAP audit alignment
- node_type: generation
  primary_domains:
  - 3.0 Misinformation
  - 1.0 Discrimination & Toxicity
  - '7.0'
  primary_subdomains:
  - '3.1'
  - '3.2'
  - '7.3'
  rationale: LLM generation nodes — hallucination + information ecosystem pollution + lack of robustness are the core risks. Air Canada precedent; KoFIU reporting LLM narrator risk.
  korean_anchor: loan_underwriting_kr.N6 LLM Risk Narrator — mandatory T&C/statutory citation to suppress hallucination
- node_type: RAG
  primary_domains:
  - 2.0 Privacy & Security
  - 3.0 Misinformation
  primary_subdomains:
  - '2.1'
  - '2.2'
  - '3.1'
  rationale: RAG — retrieval corpus leakage + hallucination following incorrect retrieval. K-PIPA Art 22-2 aligned.
  korean_anchor: legal_contract_review.N2 Clause Extraction — corpus access-permission isolation + retrieval accuracy audit
- node_type: tool_invocation
  primary_domains:
  - 2.0 Privacy & Security
  - 4.0 Malicious actors
  - '7.0'
  primary_subdomains:
  - '2.2'
  - '4.2'
  - '7.2'
  rationale: Tool call — Excessive Agency + permission escalation. MITRE ATLAS Execution (TA0005) tactic aligned.
  korean_anchor: loan_underwriting_kr.N3 KoFIU AML call — least-privilege scope + audit log
- node_type: human_review
  primary_domains:
  - 5.0 Human-Computer Interaction
  - '7.0'
  primary_subdomains:
  - '5.1'
  - '5.2'
  - '7.4'
  rationale: Review nodes — overreliance + loss of autonomy. "Automation trust bias" (reviewer atrophy) is the core heuristic.
  korean_anchor: loan_underwriting_kr.N5 human approval — HITL_bypass / reviewer_atrophy cell aligned
- node_type: handoff
  primary_domains:
  - 7.0 AI safety/failures
  - '5.0'
  - '3.0'
  primary_subdomains:
  - '7.3'
  - '7.6'
  - '3.1'
  rationale: Handoff — semantic/context drift (schema_contract_drift, weighting_loss). Multi-agent risk. ★ Core proprietary
    IP of FDE Agent.
  korean_anchor: loan_underwriting_kr.N3→N4 AML→ACS, N4→N6 ACS→LLM — IPS metric aligned
- node_type: decision
  primary_domains:
  - 1.0 Discrimination & Toxicity
  - '5.0'
  - '6.0'
  primary_subdomains:
  - '1.1'
  - '5.2'
  - '6.5'
  rationale: Automated decision-making — discrimination + loss of autonomy + governance failure. EU AI Act high-risk classification aligned.
  korean_anchor: loan_underwriting_kr.N7 auto-approval — false_negative_cascade cell + FSS regulatory notice
- node_type: external_send
  primary_domains:
  - 2.0 Privacy & Security
  - 4.0 Malicious actors
  - '6.0'
  primary_subdomains:
  - '2.1'
  - '4.3'
  - '6.5'
  rationale: External communication — PII leakage + fraud exposure + governance failure. external_communication_risk cell aligned.
  korean_anchor: loan_underwriting_kr.N7→External — Risk Disclosure + appeal channel + KoFIU reporting
