# =============================================================
# v0.3 — Handoff Quantification Framework (★ 본 아이디어 기술적 moat)
# =============================================================
#
# 동기: handoff axis의 휴리스틱을 수학적 정량 지표로 격상.
# 결과: 컨설팅 휴리스틱 + 정량 메트릭 = generic AI tool과 결정적 차별화.
# Arize Phoenix와 정확 정합 — Phoenix custom metric으로 박을 수 있음.
# 구현: 본 세션은 design만, 실제 구현은 Phase 1 (Rapid Agent) PoC v0.2 (세션 B)에서.

handoff_quantification_framework:

  metric_1_intent_preservation_score:
    short_name: IPS
    description: |
      상위 노드 산출 텍스트와 하위 노드 진단 텍스트 간 의미 유사도.
      cosine(embed(upstream_output), embed(downstream_diagnosis))
      → 임계치 이하면 'Context Decay Alert' 발생.
    formula: |
      IPS(node_a → node_b) = cosine_similarity(
        BGE-M3.embed(node_a.output_text),
        BGE-M3.embed(node_b.diagnosis_or_summary_text)
      )
    interpretation:
      "1.0":  "perfect preservation (rare)"
      "0.7~0.9":  "healthy handoff"
      "0.5~0.7":  "watch zone — context partially lost"
      "below 0.5": "Context Decay Alert — silent failure risk high"
    implementation:
      infrastructure: "BGE-M3 (이미 Chroma에서 사용 중) — 추가 인프라 없음"
      latency: "node 당 ~50ms embedding compute (negligible)"
      output: "per-handoff numeric score + alert binary"
    use_in_diagnosis:
      - "RED handoff cell에 IPS threshold 추가 (현재 risk_score는 휴리스틱 평가, IPS는 runtime 측정)"
      - "워크플로우 실제 운영 시 (post-deployment) IPS streaming → drift detection"
      - "Heatmap에 'Decay' badge per-edge 가능"
    applies_to:
      - N2_clause_extraction → N3_risk_flagging (schema_contract_drift cell)
      - N3_risk_flagging → N5b_attorney_review (weighting_loss cell)
      - loan_N4_credit_scoring → loan_N7_auto_decision (bias_cascade_from_ACS cell)
      - loan_N6_llm_risk → loan_N7_auto_decision (false_negative_cascade cell)
      - 모든 LLM-to-LLM handoff에 universal

  metric_2_confidence_decay:
    short_name: ConfDecay
    description: |
      각 노드의 confidence score가 downstream으로 갈수록 어떻게 변동하는지 측정.
      특히 over-trust 패턴: low upstream confidence (0.7) → high downstream confidence (0.99)
      이건 본인 IP의 가장 강한 instantiation — '자동화 신뢰 편향'의 수치화.
    formula: |
      ConfDecay(node_a → node_b) = node_b.confidence - node_a.confidence
      Over-Trust Gap = max(0, ConfDecay) when node_a.confidence < 0.8
      Under-Use Gap = max(0, -ConfDecay) when node_a.confidence > 0.9
    interpretation:
      "Over-Trust Gap > 0.2":  "ALERT — downstream이 upstream uncertainty를 무시하고 over-commit"
      "Under-Use Gap > 0.2":   "WARNING — downstream이 confident upstream을 underutilize"
      "abs(decay) ≤ 0.1":       "healthy propagation"
    implementation:
      requirement: "각 sub-agent가 output에 confidence score 필수 attach (현재 PoC v0.1은 confidence 없음 — v0.2 구현 필요)"
      output: "per-handoff numeric gap + binary alert"
    use_in_diagnosis:
      - "loan_N6 → loan_N7 핵심 사례: N6 LLM 위험 분석이 0.7 confidence였는데 N7이 0.99로 자동 승인 결정 = silent escalation"
      - "Post-deployment monitoring: confidence delta distribution이 시간에 따라 drift하면 model retraining trigger"
    applies_to:
      - 모든 sequential LLM handoff
      - 특히 LLM → decision automation handoff (N5a, loan_N7)

  metric_3_llm_as_judge:
    short_name: LaaJ
    description: |
      두 노드 output을 별도 LLM이 alignment·coherence·factual consistency 평가.
      Multi-LLM ensemble의 자연스러운 instantiation — Arize Phoenix와 정확 정합.
    formula: |
      LaaJ(node_a, node_b) = JudgeLLM.score(
        prompt="""Are these two outputs aligned, coherent, and factually consistent?
        Node A ({a.type}): {a.output}
        Node B ({b.type}): {b.output}
        Return: alignment_score [0,1], reasoning, disagreement_flags""",
        judge_model="claude-3.5-sonnet"  # or different family from upstream
      )
    interpretation:
      "alignment_score < 0.6":  "Judge가 disagreement detect — manual review trigger"
      "disagreement_flags 비어있지 않음":  "specific issue 검토 필요"
    implementation:
      cost: "judge LLM call per handoff = $$ — 모든 노드에 매번 호출 아닌 sampling 권장 (e.g., 10% spot-check)"
      output: "alignment score + reasoning + disagreement flags"
    use_in_diagnosis:
      - "Sub-Agent 6 (Claude Peer Reviewer)의 자연스러운 extension"
      - "Phase 1 Rapid Agent에서 Arize Phoenix가 LaaJ score를 시각화"
    arize_phoenix_integration:
      - "Phoenix custom metric으로 IPS + ConfDecay + LaaJ 3종 모두 etch"
      - "Trace UI에 per-handoff 3 metric overlay = 본 아이디어 시각화 자산"

# =============================================================
# Handoff cell 통합 사용
# =============================================================

# 기존 handoff cells (v0.1/v0.2)의 risk_score는 design-time 휴리스틱 평가.
# v0.3 metrics는 runtime 측정 → design-time + runtime 결합으로 진단 깊이↑.
#
# 예시 (loan_N7_handoff cell 강화):
#   기존: bias_cascade_from_ACS (heuristic), risk_score 4.7
#   v0.3 추가:
#     - IPS(N4 → N7): runtime 측정 — ACS 결과의 의미가 N7 결정에 반영되는지
#     - ConfDecay(N6 → N7): N6 LLM 위험 분석 confidence와 N7 결정 confidence gap
#     - LaaJ(N4, N7): ACS factor와 N7 결정의 alignment 평가
#   결과: 단일 휴리스틱 → 3 차원 정량 + 휴리스틱 = 진단 robustness↑

# =============================================================
# 구현 우선순위 (세션 B Phase 1에서)
# =============================================================
#
# P1: IPS (BGE-M3 인프라 그대로 사용 가능, 즉시 구현)
# P2: ConfDecay (각 sub-agent에 confidence output 추가 필요)
# P3: LaaJ (judge LLM 호출 추가 — Arize Phoenix와 정합 narrative 강화)
#
# 본 세션 종료 후 세션 B에서 PoC v0.2에 P1부터 구현.

axes:
  general_failure:
    description: "Functional failure of the node itself (hallucination, edge case, drift, false negative, etc.)"
    sources: [AIID corpus, MIT Risk Repository, NANDA 정성 발견]
  security:
    description: "Attack surface (OWASP LLM Top 10 + MITRE ATLAS)"
    sources: [OWASP LLM Top 10 v2025, MITRE ATLAS v5.4.0]
  handoff:
    description: "Inter-node context loss, responsibility boundaries, human-AI trust bias, etc. (core area of proprietary consulting IP, missing in public data)"
    sources: [본인 휴리스틱, NANDA "GenAI Divide" learning gap insight]
    # ─────────────────────────────────────────────────────────
    # Agentic Failure Taxonomy (v0.4 — 본 sprint 추가, 외부 review feedback 반영)
    # ─────────────────────────────────────────────────────────
    # Multi-agent / agentic 시스템에서 발생하는 6대 cascade failure 패턴.
    # 단일 LLM call이 아닌 chain (Agent A → Tool → Agent B → RAG → Decision) 컨텍스트에서
    # FDE Agent 진단의 1st-class concept. 본인 IP의 agentic extension.
    agentic_failure_taxonomy:
      - id: agent_handoff_misalignment
        description: "Agent A's output format, meaning, and confidence misalign with Agent B's input assumptions — silent drift"
        external_reference: "Liu et al. (2024) — AgentBench multi-agent error traces 18% misalignment rate (https://arxiv.org/abs/2308.03688)"
        diagnostic_signal: "downstream agent가 upstream 의도와 다른 task로 분기, 단 error는 raise 안 됨 (silent)"
        fde_cells_applicable: [N2_handoff, loan_N4_handoff, loan_N6_handoff]
        runtime_metric: "IPS (Information Preservation Score) < 0.5"
      - id: rag_retrieval_poisoning_by_agent
        description: "Agent reinforces RAG results with its own hallucination and propagates to downstream agents — false information amplification"
        external_reference: "Zou et al. (2024) — PoisonedRAG attack on LLM RAG pipelines (https://arxiv.org/abs/2402.07867)"
        diagnostic_signal: "동일 retrieval source에 대해 N회 추론마다 결과 분산 ↑ + reasoning trace에 source 인용 누락"
        fde_cells_applicable: [N2_handoff, N3_handoff, loan_N6_handoff]
        runtime_metric: "Confidence Decay > 0.3 across N hops"
      - id: tool_execution_loop
        description: "Agent repeatedly calls the same tool with incorrect inputs — token budget exhaustion + side effect risk"
        external_reference: "WebArena (Zhou et al., 2024) — agent webhook recursion failure cases (https://arxiv.org/abs/2307.13854)"
        diagnostic_signal: "단일 task 내 tool call frequency가 baseline의 N×, 동일 parameter signature 반복"
        fde_cells_applicable: [N5a_handoff, loan_N7_handoff]
        runtime_metric: "tool_call_depth > threshold (default 5)"
      - id: cascading_failure
        description: "Silent failure of a single upstream node is amplified across the entire chain path — agentic expansion of 'cascade_amplification' from Phase 0 v0.3c"
        external_reference: "Anthropic agentic safety blog (2024) — chain fault propagation taxonomy"
        diagnostic_signal: "N+1 노드 error rate가 N 노드 error rate × M (M ≥ 2)"
        fde_cells_applicable: [N5a_handoff, loan_N7_handoff, loan_N9_handoff]
        runtime_metric: "downstream/upstream error correlation > 0.7"
      - id: infinite_loop_between_agents
        description: "Agent A → B → A → B ping-pong, termination condition unmet. Infinite loop in the absence of a human escalation rule"
        external_reference: "CrewAI agentic framework error logs (2025 Q1 incidents)"
        diagnostic_signal: "단일 task graph 내 동일 (agent_a, agent_b) edge 5회 이상 통과"
        fde_cells_applicable: [N6_handoff, loan_N6_handoff]
        runtime_metric: "edge_revisit_count > 5"
      - id: trust_collapse_in_chain
        description: "When 1 agent in the chain outputs a high-confidence falsehood, the downstream agent trusts it without verification → reasoning corruption"
        external_reference: "MIT NANDA — 'GenAI Divide' learning gap (2025) trust calibration findings"
        diagnostic_signal: "Confidence가 chain 진행 시 monotonically 증가 (verification 없이)"
        fde_cells_applicable: [N3_handoff, loan_N6_handoff, loan_N7_handoff]
        runtime_metric: "tail_confidence > head_confidence by margin > 0.2"
    agentic_korean_context_mapping:
      - cell: loan_N6_handoff  # LLM Risk Analysis (한국 fraud detection LLM)
        applied_failure: agent_handoff_misalignment
        scenario_ko: |
          loan_N5 income verification agent가 출력한 fraud signal (binary flag)이
          loan_N6 LLM Risk Analysis agent에서 다른 의미로 해석 — false negative cascade로 자동승인.
          특히 한국 보이스피싱 victim-as-applicant 패턴 (대포통장)에서 N5 agent가 'income legit'
          판정해도 N6가 이를 'low risk' 가정으로 재해석. IPS metric으로 정량 탐지 가능.
        mitigation_pointer: "loan_N6_handoff.mitigation_options.must_fix (N6 결과에 confidence + reasoning trace 첨부)"
        knowledge_status: "v0.4 — 한국 컨텍스트 1건 매핑 (외부 review 채택). Phase 1 PoC에서 5건 확장."

cells:

  # =============================================================
  # NODE N2: Clause Extraction (LLM-based clause extractor)
  # =============================================================

  - cell_id: N2_general_failure
    node: N2_clause_extraction
    node_type: llm_generation_structured
    ai_mode: full_automation
    axis: general_failure

    primary_failure_mode: hallucination
    secondary_failure_modes:
      - edge_case_misclassification  # 비표준 계약 (foreign jurisdiction, custom clauses)
      - schema_drift  # extracted output format이 시간에 따라 변화
      - language_specific_failure  # 한국어 etc 비영문 처리 약함

    risk_level: HIGH
    risk_score: 4.5

    evidence:
      aiid_incidents:
        - id: incident_704
          relevance: direct
          title: "Study Highlights Persistent Hallucinations in Legal AI Systems"
          similarity_to_node: 0.670
        - id: incident_1027
          relevance: direct
          title: "Norwegian Supreme Court Receives Legal Filing with Fabricated Citations"
          similarity_to_node: 0.618
      academic:
        - "MIT NANDA State of AI in Business 2025 — 95% pilots fail, hallucination as top cited cause"

    mitigation_options_ref: legal-contract-review-v0.1.md#n2-multi-option

    nist_rmf_mapping:
      functions: [MAP, MEASURE]
      sub_categories: ["MAP 2", "MEASURE 1", "MEASURE 2"]
      genai_profile_risks: ["GAI-2"]   # Confabulation / Hallucination
      rationale: "N2 = LLM 분류·추출 노드, NIST MAP 2 categorization + GenAI Profile confabulation 직접 정합"

    eu_ai_act_mapping:
      annex_iii_point: "8(a)"
      point_name: "Judicial assistance — researching/interpreting facts and law"
      articles: ["Article 13 (transparency)", "Article 15 (accuracy)", "Article 9 (risk management)"]
      obligations:
        - "Legal contract review 워크플로우가 법무법인·기업법무팀에 배포 시 8(a) high-risk 자동 분류"
        - "Article 15 accuracy: hallucinated clause extraction = 직접 위반 risk"
      korean_regulatory_overlap: ["K-PIPA Article 22-2 (AI 자동 의사결정 권리)"]

  - cell_id: N2_security
    node: N2_clause_extraction
    axis: security

    primary_threats:
      - id: LLM09
        title: "Misinformation"
        relevance: direct  # hallucinated clauses = misinformation downstream
      - id: LLM06
        title: "Excessive Agency"
        relevance: indirect  # auto-extraction feeds auto-decision pipeline
      - id: LLM01
        title: "Prompt Injection"
        relevance: "indirect  # vendor can intentionally perform prompt injection in the contract text (rare but possible)"

    mitre_atlas_techniques:
      - id: AML.T0043
        title: "Craft Adversarial Data"

    risk_level: HIGH
    risk_score: 4.2

    mitigation_options:
      must_fix:
        action: "Output schema validation enforcement — strict type + enum + per-field validator for the extracted clause JSON. Reject non-compliant outputs."
        rationale: "LLM09 Misinformation 차단 + general_failure hallucination mitigation 동시 충족 (overlap)"
        references:
          owasp_llm: ["LLM09", "LLM05"]
          mitre_atlas: ["AML.M0033", "AML.M0020"]   # Input/Output Validation + GenAI Guardrails
          mit_831: ["2.4", "3.1"]                    # Content Safety + Testing & Auditing
      recommend:
        action: "Vendor-supplied contract preprocessing — embed a calibrated PII/prompt-injection scanner at the front of the N2 input pipe (blocks LLM01 indirect)"
        rationale: "Vendor-side adversarial input의 LLM 도달 차단"
        references:
          owasp_llm: ["LLM01"]
          mitre_atlas: ["AML.M0034", "AML.M0033"]   # Restrict Library Loading + I/O Validation
          mit_831: ["2.3", "3.2"]                    # Model Safety Engineering + Data Governance
      optional:
        action: "Retrieval-grounded extraction — enforce clause anchors after retrieving playbook/precedent corpus (no free-form extract)"
        rationale: "Hallucination footprint 최소화 — RAG anchor가 LLM 자유도 제한"
        references:
          owasp_llm: ["LLM09"]
          mitre_atlas: ["AML.M0014", "AML.M0019"]   # Verify ML Artifacts + Control Access
          mit_831: ["3.2", "4.1"]                    # Data Governance + System Documentation

  - cell_id: N2_handoff
    node: N2_clause_extraction
    axis: handoff

    upstream_dependency: N1_intake_classify
    downstream_dependents: [N3_risk_flagging, N4_compare_playbook]

    primary_handoff_risk: schema_contract_drift
    description: |
      N2 extract 결과의 schema가 N3 risk flagging input format과 호환 필수.
      schema 불일치 시 silent failure로 N3가 빈 결과 산출 가능 — 진짜 risk가 missed.
      또한 N1 classify가 잘못된 contract type 분류 시, N2가 잘못된 clause set 추출.

    secondary_handoff_risks:
      - extraction_confidence_lost  # N2 confidence score가 downstream에 전달 안 됨 → downstream이 모든 결과를 equal하게 신뢰
      - cascading_silent_failure  # N2 → N3 → N5a 전 경로에 silent error 누적

    risk_level: HIGH
    risk_score: 4.0

    heuristic_source: 본인 IP (공개 데이터 결측 영역)

    mitigation_options:
      must_fix:
        action: "Confidence score downstream propagation mandatory — per-clause confidence on N2 output + confidence threshold gating on N3 input schema"
        rationale: "Silent failure 차단의 가장 직접 mitigation"
      recommend:
        action: "Schema contract test — automatic testing of N2/N3 schema compatibility for each deploy"
        rationale: "Schema drift 조기 발견"
      optional:
        action: "End-to-end synthetic test — periodically inject known-failure clauses across the entire pipeline path + monitor results"
        rationale: "Cascading failure 통합 monitoring"

  # =============================================================
  # NODE N3: Risk Flagging (LLM identifies risky clauses)
  # =============================================================

  - cell_id: N3_general_failure
    node: N3_risk_flagging
    node_type: llm_classification_binary
    ai_mode: full_automation
    axis: general_failure

    primary_failure_mode: false_negative
    secondary_failure_modes:
      - false_positive_overflow  # 너무 많은 flag → reviewer fatigue
      - novelty_blindness  # 새로운 risk pattern 미인지
      - context_loss  # 단일 clause 단위 분석으로 cross-clause risk 미인지

    risk_level: HIGH
    risk_score: 4.2

    evidence:
      aiid_incidents:
        - id: incident_704
          relevance: indirect
      academic:
        - "Klarna AI rollback case — fraud detection false negative 누적이 1차 원인 중 하나"

    mitigation_options_ref: legal-contract-review-v0.1.md#n3-multi-option

    nist_rmf_mapping:
      functions: [MAP, MEASURE]
      sub_categories: ["MAP 4", "MEASURE 2", "MEASURE 3"]
      genai_profile_risks: ["GAI-8"]   # Information Integrity
      rationale: "False negative이 risk profile 왜곡 → MEASURE 2 trustworthy + MEASURE 3 tracking 핵심"

    eu_ai_act_mapping:
      annex_iii_point: "8(a)"
      point_name: "Judicial assistance"
      articles: ["Article 9 (risk management)", "Article 10 (data governance)", "Article 14 (human oversight)"]
      obligations:
        - "Article 9: false negative pattern을 risk register에 등재 + 분기별 재평가"
        - "Article 14: high-risk flag 결과에 변호사 review 강제 (HITL)"
      korean_regulatory_overlap: ["K-PIPA Article 22-2"]

  - cell_id: N3_security
    node: N3_risk_flagging
    axis: security

    primary_threats:
      - id: LLM09
        relevance: direct
      - id: LLM05
        title: "Improper Output Handling"
        relevance: "indirect  # N3 results may flow into N4·N5a and be processed incorrectly"

    risk_level: MEDIUM
    risk_score: 3.5

    mitigation_options:
      must_fix:
        action: "Risk score schema strict typing + downstream contract — multi-dimensional scores for {liability, indemnity, IP, termination} + per-dim confidence on N3 output, no raw text for downstream"
        rationale: "Improper Output Handling 차단 + N4/N5a에서 score breakdown 강제 사용"
        references:
