# =============================================================
# v0.3 — Handoff Quantification Framework (★ Technical moat of this concept)
# =============================================================
#
# Motivation: elevate handoff axis heuristics to mathematically quantified metrics.
# Result: consulting heuristics + quantitative metrics = decisive differentiation from generic AI tools.
# Exact alignment with Arize Phoenix — can be embedded as Phoenix custom metrics.
# Implementation: this session is design only; actual implementation in Phase 1 (Rapid Agent) PoC v0.2 (Session B).

handoff_quantification_framework:

  metric_1_intent_preservation_score:
    short_name: IPS
    description: |
      Semantic similarity between upstream node output text and downstream node diagnosis text.
      cosine(embed(upstream_output), embed(downstream_diagnosis))
      → triggers 'Context Decay Alert' when below threshold.
    formula: |
      IPS(node_a → node_b) = cosine_similarity(
        BGE-M3.embed(node_a.output_text),
        BGE-M3.embed(node_b.diagnosis_or_summary_text)
      )
    interpretation:
      "1.0":  "perfect preservation (rare)"
      "0.7~0.9":  "healthy handoff"
      "0.5~0.7":  "watch zone — context partially lost"
      "below 0.5": "Context Decay Alert — silent failure risk high"
    implementation:
      infrastructure: "BGE-M3 (already in use with Chroma) — no additional infrastructure required"
      latency: "~50ms embedding compute per node (negligible)"
      output: "per-handoff numeric score + alert binary"
    use_in_diagnosis:
      - "Add IPS threshold to RED handoff cells (current risk_score is heuristic assessment, IPS is runtime measurement)"
      - "During live workflow operation (post-deployment) IPS streaming → drift detection"
      - "'Decay' badge per-edge on Heatmap is possible"
    applies_to:
      - N2_clause_extraction → N3_risk_flagging (schema_contract_drift cell)
      - N3_risk_flagging → N5b_attorney_review (weighting_loss cell)
      - loan_N4_credit_scoring → loan_N7_auto_decision (bias_cascade_from_ACS cell)
      - loan_N6_llm_risk → loan_N7_auto_decision (false_negative_cascade cell)
      - universal for all LLM-to-LLM handoffs

  metric_2_confidence_decay:
    short_name: ConfDecay
    description: |
      Measures how each node's confidence score changes as it flows downstream.
      Particularly the over-trust pattern: low upstream confidence (0.7) → high downstream confidence (0.99)
      This is the strongest instantiation of this IP — quantifying 'automation trust bias'.
    formula: |
      ConfDecay(node_a → node_b) = node_b.confidence - node_a.confidence
      Over-Trust Gap = max(0, ConfDecay) when node_a.confidence < 0.8
      Under-Use Gap = max(0, -ConfDecay) when node_a.confidence > 0.9
    interpretation:
      "Over-Trust Gap > 0.2":  "ALERT — downstream ignores upstream uncertainty and over-commits"
      "Under-Use Gap > 0.2":   "WARNING — downstream underutilizes a confident upstream"
      "abs(decay) ≤ 0.1":       "healthy propagation"
    implementation:
      requirement: "Each sub-agent must attach a confidence score to output (current PoC v0.1 has no confidence — required in v0.2 implementation)"
      output: "per-handoff numeric gap + binary alert"
    use_in_diagnosis:
      - "loan_N6 → loan_N7 key case: N6 LLM risk analysis had 0.7 confidence, but N7 made auto-approve decision at 0.99 = silent escalation"
      - "Post-deployment monitoring: if confidence delta distribution drifts over time, trigger model retraining"
    applies_to:
      - all sequential LLM handoffs
      - especially LLM → decision automation handoffs (N5a, loan_N7)

  metric_3_llm_as_judge:
    short_name: LaaJ
    description: |
      A separate LLM evaluates alignment, coherence, and factual consistency between two node outputs.
      Natural instantiation of multi-LLM ensemble — exact alignment with Arize Phoenix.
    formula: |
      LaaJ(node_a, node_b) = JudgeLLM.score(
        prompt="""Are these two outputs aligned, coherent, and factually consistent?
        Node A ({a.type}): {a.output}
        Node B ({b.type}): {b.output}
        Return: alignment_score [0,1], reasoning, disagreement_flags""",
        judge_model="claude-3.5-sonnet"  # or different family from upstream
      )
    interpretation:
      "alignment_score < 0.6":  "Judge detects disagreement — triggers manual review"
      "disagreement_flags non-empty":  "specific issue requires review"
    implementation:
      cost: "judge LLM call per handoff = $$ — recommend sampling rather than calling for every node (e.g., 10% spot-check)"
      output: "alignment score + reasoning + disagreement flags"
    use_in_diagnosis:
      - "Natural extension of Sub-Agent 6 (Claude Peer Reviewer)"
      - "Arize Phoenix visualizes LaaJ score in Phase 1 Rapid Agent"
    arize_phoenix_integration:
      - "Embed all 3 types (IPS + ConfDecay + LaaJ) as Phoenix custom metrics"
      - "Per-handoff 3-metric overlay on Trace UI = visualization asset for this concept"

# =============================================================
# Handoff cell integrated usage
# =============================================================

# Existing handoff cells (v0.1/v0.2) risk_score is design-time heuristic assessment.
# v0.3 metrics are runtime measurements → combining design-time + runtime deepens diagnostic depth.
#
# Example (loan_N7_handoff cell enhancement):
#   Existing: bias_cascade_from_ACS (heuristic), risk_score 4.7
#   v0.3 additions:
#     - IPS(N4 → N7): runtime measurement — whether the meaning of ACS results is reflected in N7 decisions
#     - ConfDecay(N6 → N7): gap between N6 LLM risk analysis confidence and N7 decision confidence
#     - LaaJ(N4, N7): alignment evaluation between ACS factors and N7 decision
#   Result: single heuristic → 3-dimensional quantitative + heuristic = improved diagnostic robustness

# =============================================================
# Implementation priority (in Session B Phase 1)
# =============================================================
#
# P1: IPS (can use BGE-M3 infrastructure as-is, implement immediately)
# P2: ConfDecay (requires adding confidence output to each sub-agent)
# P3: LaaJ (add judge LLM call — strengthens alignment narrative with Arize Phoenix)
#
# After this session, implement from P1 in PoC v0.2 during Session B.

axes:
  general_failure:
    description: "Functional failure of the node itself (hallucination, edge case, drift, false negative, etc.)"
    sources: [AIID corpus, MIT Risk Repository, NANDA qualitative findings]
  security:
    description: "Attack surface (OWASP LLM Top 10 + MITRE ATLAS)"
    sources: [OWASP LLM Top 10 v2025, MITRE ATLAS v5.4.0]
  handoff:
    description: "Inter-node context loss, responsibility boundaries, human-AI trust bias, etc. (core area of proprietary consulting IP, missing in public data)"
    sources: [proprietary heuristics, NANDA "GenAI Divide" learning gap insight]
    # ─────────────────────────────────────────────────────────
    # Agentic Failure Taxonomy (v0.4 — added in this sprint, incorporating external review feedback)
    # ─────────────────────────────────────────────────────────
    # Six major cascade failure patterns in multi-agent / agentic systems.
    # In the context of a chain (Agent A → Tool → Agent B → RAG → Decision), not a single LLM call —
    # a 1st-class concept in FDE Agent diagnosis. Agentic extension of proprietary IP.
    agentic_failure_taxonomy:
      - id: agent_handoff_misalignment
        description: "Agent A's output format, meaning, and confidence misalign with Agent B's input assumptions — silent drift"
        external_reference: "Liu et al. (2024) — AgentBench multi-agent error traces 18% misalignment rate (https://arxiv.org/abs/2308.03688)"
        diagnostic_signal: "downstream agent diverges to a different task from upstream intent, but no error is raised (silent)"
        fde_cells_applicable: [N2_handoff, loan_N4_handoff, loan_N6_handoff]
        runtime_metric: "IPS (Information Preservation Score) < 0.5"
      - id: rag_retrieval_poisoning_by_agent
        description: "Agent reinforces RAG results with its own hallucination and propagates to downstream agents — false information amplification"
        external_reference: "Zou et al. (2024) — PoisonedRAG attack on LLM RAG pipelines (https://arxiv.org/abs/2402.07867)"
        diagnostic_signal: "result variance increases across N inferences on the same retrieval source + missing source citations in reasoning trace"
        fde_cells_applicable: [N2_handoff, N3_handoff, loan_N6_handoff]
        runtime_metric: "Confidence Decay > 0.3 across N hops"
      - id: tool_execution_loop
        description: "Agent repeatedly calls the same tool with incorrect inputs — token budget exhaustion + side effect risk"
        external_reference: "WebArena (Zhou et al., 2024) — agent webhook recursion failure cases (https://arxiv.org/abs/2307.13854)"
        diagnostic_signal: "tool call frequency within a single task is N× the baseline, repeated with the same parameter signature"
        fde_cells_applicable: [N5a_handoff, loan_N7_handoff]
        runtime_metric: "tool_call_depth > threshold (default 5)"
      - id: cascading_failure
        description: "Silent failure of a single upstream node is amplified across the entire chain path — agentic expansion of 'cascade_amplification' from Phase 0 v0.3c"
        external_reference: "Anthropic agentic safety blog (2024) — chain fault propagation taxonomy"
        diagnostic_signal: "N+1 node error rate is N node error rate × M (M ≥ 2)"
        fde_cells_applicable: [N5a_handoff, loan_N7_handoff, loan_N9_handoff]
        runtime_metric: "downstream/upstream error correlation > 0.7"
      - id: infinite_loop_between_agents
        description: "Agent A → B → A → B ping-pong, termination condition unmet. Infinite loop in the absence of a human escalation rule"
        external_reference: "CrewAI agentic framework error logs (2025 Q1 incidents)"
        diagnostic_signal: "same (agent_a, agent_b) edge traversed 5 or more times within a single task graph"
        fde_cells_applicable: [N6_handoff, loan_N6_handoff]
        runtime_metric: "edge_revisit_count > 5"
      - id: trust_collapse_in_chain
        description: "When 1 agent in the chain outputs a high-confidence falsehood, the downstream agent trusts it without verification → reasoning corruption"
        external_reference: "MIT NANDA — 'GenAI Divide' learning gap (2025) trust calibration findings"
        diagnostic_signal: "Confidence increases monotonically as the chain progresses (without verification)"
        fde_cells_applicable: [N3_handoff, loan_N6_handoff, loan_N7_handoff]
        runtime_metric: "tail_confidence > head_confidence by margin > 0.2"
    agentic_korean_context_mapping:
      - cell: loan_N6_handoff  # LLM Risk Analysis (Korean fraud detection LLM)
        applied_failure: agent_handoff_misalignment
        scenario_ko: |
          The fraud signal (binary flag) output by the loan_N5 income verification agent
          is misinterpreted by the loan_N6 LLM Risk Analysis agent — leading to auto-approval via false negative cascade.
          Particularly in the Korean voice phishing victim-as-applicant pattern (burner account), even if the N5 agent rules 'income legit',
          N6 re-interprets this as a 'low risk' assumption. Quantitatively detectable via the IPS metric.
        mitigation_pointer: "loan_N6_handoff.mitigation_options.must_fix (attach confidence + reasoning trace to N6 output)"
        knowledge_status: "v0.4 — 1 Korean context mapped (adopted in external review). Expanding to 5 cases in Phase 1 PoC."

cells:

  # =============================================================
  # NODE N2: Clause Extraction (LLM-based clause extractor)
  # =============================================================

  - cell_id: N2_general_failure
    node: N2_clause_extraction
    node_type: llm_generation_structured
    ai_mode: full_automation
    axis: general_failure

    primary_failure_mode: hallucination
    secondary_failure_modes:
      - edge_case_misclassification  # non-standard contracts (foreign jurisdiction, custom clauses)
      - schema_drift  # extracted output format changes over time
      - language_specific_failure  # weak processing of non-English languages such as Korean

    risk_level: HIGH
    risk_score: 4.5

    evidence:
      aiid_incidents:
        - id: incident_704
          relevance: direct
          title: "Study Highlights Persistent Hallucinations in Legal AI Systems"
          similarity_to_node: 0.670
        - id: incident_1027
          relevance: direct
          title: "Norwegian Supreme Court Receives Legal Filing with Fabricated Citations"
          similarity_to_node: 0.618
      academic:
        - "MIT NANDA State of AI in Business 2025 — 95% pilots fail, hallucination as top cited cause"

    mitigation_options_ref: legal-contract-review-v0.1.md#n2-multi-option

    nist_rmf_mapping:
      functions: [MAP, MEASURE]
      sub_categories: ["MAP 2", "MEASURE 1", "MEASURE 2"]
      genai_profile_risks: ["GAI-2"]   # Confabulation / Hallucination
      rationale: "N2 = LLM classification/extraction node, directly maps to NIST MAP 2 categorization + GenAI Profile confabulation"

    eu_ai_act_mapping:
      annex_iii_point: "8(a)"
      point_name: "Judicial assistance — researching/interpreting facts and law"
      articles: ["Article 13 (transparency)", "Article 15 (accuracy)", "Article 9 (risk management)"]
      obligations:
        - "Legal contract review workflow automatically classified as 8(a) high-risk when deployed to law firms or corporate legal teams"
        - "Article 15 accuracy: hallucinated clause extraction = direct violation risk"
      korean_regulatory_overlap: ["K-PIPA Article 22-2 (right regarding AI automated decision-making)"]

  - cell_id: N2_security
    node: N2_clause_extraction
    axis: security

    primary_threats:
      - id: LLM09
        title: "Misinformation"
        relevance: direct  # hallucinated clauses = misinformation downstream
      - id: LLM06
        title: "Excessive Agency"
        relevance: indirect  # auto-extraction feeds auto-decision pipeline
      - id: LLM01
        title: "Prompt Injection"
        relevance: "indirect  # vendor can intentionally perform prompt injection in the contract text (rare but possible)"

    mitre_atlas_techniques:
      - id: AML.T0043
        title: "Craft Adversarial Data"

    risk_level: HIGH
    risk_score: 4.2

    mitigation_options:
      must_fix:
        action: "Output schema validation enforcement — strict type + enum + per-field validator for the extracted clause JSON. Reject non-compliant outputs."
        rationale: "Blocks LLM09 Misinformation + simultaneously satisfies general_failure hallucination mitigation (overlap)"
        references:
          owasp_llm: ["LLM09", "LLM05"]
          mitre_atlas: ["AML.M0033", "AML.M0020"]   # Input/Output Validation + GenAI Guardrails
          mit_831: ["2.4", "3.1"]                    # Content Safety + Testing & Auditing
      recommend:
        action: "Vendor-supplied contract preprocessing — embed a calibrated PII/prompt-injection scanner at the front of the N2 input pipe (blocks LLM01 indirect)"
        rationale: "Blocks vendor-side adversarial input from reaching the LLM"
        references:
          owasp_llm: ["LLM01"]
          mitre_atlas: ["AML.M0034", "AML.M0033"]   # Restrict Library Loading + I/O Validation
          mit_831: ["2.3", "3.2"]                    # Model Safety Engineering + Data Governance
      optional:
        action: "Retrieval-grounded extraction — enforce clause anchors after retrieving playbook/precedent corpus (no free-form extract)"
        rationale: "Minimizes hallucination footprint — RAG anchor restricts LLM degrees of freedom"
        references:
          owasp_llm: ["LLM09"]
          mitre_atlas: ["AML.M0014", "AML.M0019"]   # Verify ML Artifacts + Control Access
          mit_831: ["3.2", "4.1"]                    # Data Governance + System Documentation

  - cell_id: N2_handoff
    node: N2_clause_extraction
    axis: handoff

    upstream_dependency: N1_intake_classify
    downstream_dependents: [N3_risk_flagging, N4_compare_playbook]

    primary_handoff_risk: schema_contract_drift
    description: |
      N2 extraction output schema must be compatible with N3 risk flagging input format.
      Schema mismatch can cause N3 to produce empty results via silent failure — real risk gets missed.
      Also, if N1 classify routes to the wrong contract type, N2 extracts the wrong clause set.

    secondary_handoff_risks:
      - extraction_confidence_lost  # N2 confidence score not propagated downstream → downstream trusts all results equally
      - cascading_silent_failure  # silent errors accumulate across the full N2 → N3 → N5a path

    risk_level: HIGH
    risk_score: 4.0

    heuristic_source: Proprietary IP (domain missing from public data)

    mitigation_options:
      must_fix:
        action: "Confidence score downstream propagation mandatory — per-clause confidence on N2 output + confidence threshold gating on N3 input schema"
        rationale: "Most direct mitigation for blocking silent failure"
      recommend:
        action: "Schema contract test — automatic testing of N2/N3 schema compatibility for each deploy"
        rationale: "Early detection of schema drift"
      optional:
        action: "End-to-end synthetic test — periodically inject known-failure clauses across the entire pipeline path + monitor results"
        rationale: "Integrated monitoring of cascading failure"

  # =============================================================
  # NODE N3: Risk Flagging (LLM identifies risky clauses)
  # =============================================================

  - cell_id: N3_general_failure
    node: N3_risk_flagging
    node_type: llm_classification_binary
    ai_mode: full_automation
    axis: general_failure

    primary_failure_mode: false_negative
    secondary_failure_modes:
      - false_positive_overflow  # too many flags → reviewer fatigue
      - novelty_blindness  # failure to recognize novel risk patterns
      - context_loss  # single-clause-level analysis fails to detect cross-clause risk

    risk_level: HIGH
    risk_score: 4.2

    evidence:
      aiid_incidents:
        - id: incident_704
          relevance: indirect
      academic:
        - "Klarna AI rollback case — accumulation of fraud detection false negatives as a primary contributing factor"

    mitigation_options_ref: legal-contract-review-v0.1.md#n3-multi-option

    nist_rmf_mapping:
      functions: [MAP, MEASURE]
      sub_categories: ["MAP 4", "MEASURE 2", "MEASURE 3"]
      genai_profile_risks: ["GAI-8"]   # Information Integrity
      rationale: "False negative distorts risk profile → core for MEASURE 2 trustworthy + MEASURE 3 tracking"

    eu_ai_act_mapping:
      annex_iii_point: "8(a)"
      point_name: "Judicial assistance"
      articles: ["Article 9 (risk management)", "Article 10 (data governance)", "Article 14 (human oversight)"]
      obligations:
        - "Article 9: register false negative patterns in risk register + quarterly re-evaluation"
        - "Article 14: mandatory attorney review (HITL) for high-risk flag results"
      korean_regulatory_overlap: ["K-PIPA Article 22-2"]

  - cell_id: N3_security
    node: N3_risk_flagging
    axis: security

    primary_threats:
      - id: LLM09
        relevance: direct
      - id: LLM05
        title: "Improper Output Handling"
        relevance: "indirect  # N3 results may flow into N4·N5a and be processed incorrectly"

    risk_level: MEDIUM
    risk_score: 3.5

    mitigation_options:
      must_fix:
        action: "Risk score schema strict typing + downstream contract — multi-dimensional scores for {liability, indemnity, IP, termination} + per-dim confidence on N3 output, no raw text for downstream"
        rationale: "Blocks Improper Output Handling + forces use of score breakdown in N4/N5a"
        references:
          owasp_llm: ["LLM05", "LLM09"]
          mitre_atlas: ["AML.M0033", "AML.M0020"]   # I/O Validation + GenAI Guardrails
          mit_831: ["2.4", "3.1"]                    # Content Safety + Testing & Auditing
      recommend:
        action: "Red-team risk-flagging corpus — quarterly measurement of N3 evasion using a known-malicious clause set"
        rationale: "Tracks LLM09 evasion drift (adversarial vendor scenario)"
        references:
          owasp_llm: ["LLM09"]
          mitre_atlas: ["AML.M0005", "AML.M0008"]   # Adversarial Training + Validate ML Model
          mit_831: ["3.1", "2.3"]                    # Testing & Auditing + Model Safety Engineering
      optional:
        action: "Score provenance log — permanent recording of prompt version + model version + retrieval context for each N3 decision"
        rationale: "Post-incident tracking + dispute evidence"
        references:
          owasp_llm: ["LLM05"]
          mitre_atlas: ["AML.M0024"]                # AI Telemetry Logging
          mit_831: ["4.1", "4.3"]                    # System Documentation + Incident Reporting

  - cell_id: N3_handoff
    node: N3_risk_flagging
    axis: handoff

    upstream_dependency: N2_clause_extraction
    downstream_dependents: [N4_compare_playbook, N5b_attorney_review]

    primary_handoff_risk: weighting_loss
    description: |
      When N3 outputs a single risk score, the nuance of multi-dimensional risk (e.g., liability ↑ but indemnity OK)
      is not conveyed downstream. The attorney (N5b) may over-trust the N3 score alone (automation trust bias).

    secondary_handoff_risks:
      - threshold_arbitrary  # no basis for N4's 0.3 threshold → false positive/negative trade-off unvalidated
      - escalation_under_trigger  # high-risk score but passes silently when escalation rules are not designed

    risk_level: HIGH
    risk_score: 4.0

    heuristic_source: Proprietary IP

    mitigation_options:
      must_fix:
        action: "Multi-dim risk vector output — no single score, separate outputs for [liability/indemnity/IP/termination]"
        rationale: "Preserving nuance is the most root-level mitigation"
      recommend:
        action: "Variance flagging — automatic escalation upon large variance among risk dimensions"
        rationale: "Automatic outlier detection"
      optional:
        action: "Visualize score breakdown on the attorney dashboard (no single number)"
        rationale: "Avoids trust bias — attorney exercises own judgment while reviewing multi-dimensional data"

  # =============================================================
  # NODE N5a: Auto-Approve (Excessive Autonomy)
  # =============================================================

  - cell_id: N5a_general_failure
    node: N5a_auto_approve
    node_type: decision_automation
    ai_mode: full_automation
    axis: general_failure

    primary_failure_mode: false_positive_approval  # risky contract auto-approved
    secondary_failure_modes:
      - threshold_drift  # threshold becomes too lenient over time
      - cascade_amplification  # all silent failures from N2/N3/N4 are amplified at N5a

    risk_level: CRITICAL
    risk_score: 4.8

    evidence:
      aiid_incidents:
        - id: incident_704
          relevance: indirect
      academic:
        - "Klarna AI rollback — autonomous customer service decisions backed off"
        - "Air Canada v. Moffatt precedent — autonomous AI promise = legal liability"
        - "MIT NANDA — 95% pilots stall, autonomous decisions in regulated industries retreat most frequently"

    nist_rmf_mapping:
      functions: [GOVERN, MANAGE]
      sub_categories: ["GOVERN 1", "MANAGE 1", "MANAGE 4"]
      genai_profile_risks: ["GAI-7"]   # Human-AI Configuration
      rationale: "Auto-approval = decision with external impact. Aligned with MANAGE 1 prioritized response + GAI-7 human-AI config (determining automation depth)"

    eu_ai_act_mapping:
      annex_iii_point: "8(a)"
      point_name: "Judicial assistance — applying the law to concrete facts"
      articles: ["Article 14 (★ human oversight)", "Article 26 (deployer log retention)", "Article 9", "Article 13"]
      obligations:
        - "★ Article 14 deficit risk: 'auto-approve' poses risk of violating human oversight obligation — N5b attorney escalation mandatory"
        - "Article 26: audit log retention of 6 months or more"
      korean_regulatory_overlap: ["K-PIPA Article 22-2", "Credit Information Act Article 36-2 (aligned with right to opt out of automated decision-making)"]

  - cell_id: N5a_security
    node: N5a_auto_approve
    axis: security

    primary_threats:
      - id: LLM06
        title: "Excessive Agency"
        relevance: direct
        specific_sub: excessive_autonomy

    mitre_atlas_tactics:
      - id: AML.TA0011
        title: "Impact"  # autonomous decision = direct impact on real-world

    risk_level: CRITICAL
    risk_score: 4.8

    mitigation_options_ref: legal-contract-review-v0.1.md#n5a-multi-option

