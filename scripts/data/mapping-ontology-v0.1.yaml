      must_fix:
        action: "Multi-factor identity gating — no single OCR + face, mandatory combination with telecom identity verification (PASS, etc.)"
        rationale: "단일 modality 우회 가능성 → multi-factor가 deepfake/forgery 핵심 차단"
      recommend:
        action: "Mandatory quarterly evaluation set for Liveness detection (including latest deepfake tools)"
        rationale: "Deepfake evolution 추적"
      optional:
        action: "Propagation of both OCR confidence + face match score to downstream nodes"
        rationale: "Low confidence ID는 N6 LLM 위험 분석 input으로 활용"

