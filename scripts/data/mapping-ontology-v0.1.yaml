        rationale: "사후 catch 기회"
      optional:
        action: "Reviewer rotation — monitor auto-approve ratio, mandatory assignment of routine real-cases to N5b attorneys if a certain threshold is exceeded"
        rationale: "Long-term review skill 보존"


