    upstream_dependency: N4_compare_playbook
    downstream_dependents: [N7_signoff, N8_audit]

    primary_handoff_risk: HITL_bypass
    description: |
      N5a가 HITL을 완전히 bypass하는 게 risk 본질. N4 threshold 결정이 silent gate가 됨.
      더 깊은 문제: audit log (N8)가 "auto-approved" stamp만 기록하면 사후 추적 시 진단 불가.
