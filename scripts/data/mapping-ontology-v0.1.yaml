      특히 보이스피싱 victim-as-applicant 시 N2 통과하므로 N6 LLM 위험 분석이 last line of defense — 본인 IP의 핵심 패턴 (loan_N6_handoff와 정합).

    secondary_handoff_risks:
      - confidence_lost_downstream  # OCR confidence 등 미전달 시 모든 결과 동등
      - retroactive_identity_change_blindness  # 추후 다른 신원 의심 시 historical 결정 영향 추적 X

    risk_level: MEDIUM
    risk_score: 3.5

    heuristic_source: 본인 IP (한국 보이스피싱 victim-as-applicant 컨텍스트)

    mitigation_options:
      must_fix:
        action: "Attach OCR confidence + face match score + multi-factor result all to N2 output → N6 handles borderline cases separately"
        rationale: "Silent identity propagation 차단"
      recommend:
        action: "Identity-mismatch retroactive scan — batch review of historical applications upon subsequent fraud discovery"
        rationale: "Identity evolution 추적"
      optional:
        action: "High-risk ID pattern (multiple reissuances, etc.) detection sub-model"
        rationale: "Long-term fraud landscape 대응"

