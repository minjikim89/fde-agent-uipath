          mit_831: ["3.1", "3.6"]                    # Testing & Auditing + Incident Response & Recovery
      optional:
        action: "Capability ceiling — automatic freeze + revert to attorney routing if the quarterly auto-approve ratio deviates by ±1σ from the baseline"
        rationale: "Excessive Agency long-term drift 자동 제어"
        references:
          owasp_llm: ["LLM06"]
          mitre_atlas: ["AML.M0030"]
          mit_831: ["1.5", "3.5"]                    # Safety Decision Frameworks + Post-Deployment Monitoring

