id: NIST_AI_RMF
name: NIST Artificial Intelligence Risk Management Framework
version: 1.0
genai_profile_version: NIST AI 600-1 (2024)
source:
  primary: https://www.nist.gov/itl/ai-risk-management-framework
  rmf_pdf: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
  genai_profile: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf
